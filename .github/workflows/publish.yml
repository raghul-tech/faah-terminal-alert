name: Publish to VS Code Marketplace

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build extension
      run: npm run build
    
    - name: Get version from tag or input
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${GITHUB_REF#refs/tags/v}"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Publishing version: $VERSION"
    
    - name: Package extension
      run: npm run package
    
    - name: Publish to VS Code Marketplace
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
      if: env.VSCE_PAT != ''
      run: |
        echo "Publishing to VS Code Marketplace..."
        npx vsce publish --pat $VSCE_PAT
        echo "Published to VS Code Marketplace!"
    
    - name: Publish to Open VSX Registry (for Cursor/Windsurf)
      env:
        OPENVSX_PAT: ${{ secrets.OPENVSX_PAT }}
      if: env.OPENVSX_PAT != ''
      run: |
        echo "Publishing to Open VSX Registry..."
        npm install -g ovsx
        ovsx publish --pat $OPENVSX_PAT
        echo "Published to Open VSX Registry!"
    
    - name: Publish to Azure DevOps Marketplace
      env:
        AZURE_PAT: ${{ secrets.AZURE_PAT }}
      if: env.AZURE_PAT != ''
      run: |
        echo "Publishing to Azure DevOps Marketplace..."
        npm install -g tfx-cli
        tfx extension publish --publisher raghul-tech --extension-id faah-terminal-alert --manifest-globs package.json --share-with raghul-tech --token $AZURE_PAT
        echo "Published to Azure DevOps Marketplace!"
    
    - name: Notify on success
      if: success()
      run: |
        echo "Extension published successfully!"
        echo "Version: ${{ steps.version.outputs.VERSION }}"
        echo ""
        echo "Available in:"
        echo "- VS Code Marketplace: https://marketplace.visualstudio.com/items?itemName=raghul-tech.faah-terminal-alert"
        echo "- Open VSX Registry: https://open-vsx.org/extension/raghul-tech/faah-terminal-alert"
        echo "- Azure DevOps Marketplace: https://marketplace.visualstudio.com/items?itemName=raghul-tech.faah-terminal-alert"
        echo ""
        echo "Installation commands:"
        echo "- VS Code: code --install-extension raghul-tech.faah-terminal-alert"
        echo "- Cursor/Windsurf: Available via Open VSX Registry"
