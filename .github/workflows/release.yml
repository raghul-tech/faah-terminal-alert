name: Release and Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build extension
      run: npm run build
    
    - name: Get version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Extract Release Notes from CHANGELOG
      id: release_notes
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        echo "Extracting notes for version $VERSION"
        
        if [ -f "CHANGELOG.md" ]; then
          sed -n "/## \[$VERSION\]/,/^##/p" CHANGELOG.md | sed '$d' > release_notes_temp.md
          RELEASE_NOTES=$(cat release_notes_temp.md)
          
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="### Changes\n- Bug fixes and improvements\n- Performance enhancements"
          fi
          
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        else
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "### Changes\n- Initial release" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi
    
    - name: Package extension
      run: npx vsce package --no-dependencies --out faah-terminal-alert-${{ steps.version.outputs.VERSION }}.vsix
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        name: FAAH Terminal Alert v${{ steps.version.outputs.VERSION }}
        body: |
          ## 🎉 FAAH Terminal Alert v${{ steps.version.outputs.VERSION }}
          
          ### 📦 Installation
          ```bash
          code --install-extension raghul-tech.faah-terminal-alert
          ```
          Or search for "FAAH Terminal Alert" in VS Code Marketplace.
          
          ---
          
          ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          
          ---
          
          ### 🔗 Quick Links
          - [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=raghul-tech.faah-terminal-alert)
          - [Open VSX Registry](https://open-vsx.org/extension/raghul-tech/faah-terminal-alert)
          - [Documentation](https://github.com/raghul-tech/faah-terminal-alert/blob/main/README.md)
          - [Report Issues](https://github.com/raghul-tech/faah-terminal-alert/issues)
          - [Full Changelog](https://github.com/raghul-tech/faah-terminal-alert/blob/main/CHANGELOG.md)
          
          ### ⭐ Support
          If you find this extension helpful, please:
          - :star: Star it on GitHub
          - :thumbsup: Rate it on Marketplace
          - :bug: Report any issues you find
          
          ---
          _Made with :heart: for developers who hate staring at terminals!_
        draft: false
        prerelease: false
        files: |
          faah-terminal-alert-${{ steps.version.outputs.VERSION }}.vsix
    
    - name: Publish to VS Code Marketplace
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
      if: env.VSCE_PAT != ''
      run: |
        echo "Publishing to VS Code Marketplace..."
        npx vsce publish --pat $VSCE_PAT
        echo "Published to VS Code Marketplace!"
    
    - name: Publish to Open VSX Registry (for Cursor/Windsurf)
      env:
        OPENVSX_PAT: ${{ secrets.OPENVSX_PAT }}
      if: env.OPENVSX_PAT != ''
      run: |
        echo "Publishing to Open VSX Registry..."
        npm install -g ovsx
        ovsx publish -p $OPENVSX_PAT
        echo "Published to Open VSX Registry!"
    
    - name: Notify on success
      if: success()
      run: |
        echo "Extension released and published successfully!"
        echo "Version: ${{ steps.version.outputs.VERSION }}"
        echo ""
        echo "Available in:"
        echo "- VS Code Marketplace: https://marketplace.visualstudio.com/items?itemName=raghul-tech.faah-terminal-alert"
        echo "- Open VSX Registry: https://open-vsx.org/extension/raghul-tech/faah-terminal-alert"
        echo ""
        echo "Installation commands:"
        echo "- VS Code: code --install-extension raghul-tech.faah-terminal-alert"
        echo "- Cursor/Windsurf: Available via Open VSX Registry"
