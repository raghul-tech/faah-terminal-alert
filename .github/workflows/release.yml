name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build extension
      run: npm run build
    
    - name: Package extension
      run: npm run package
    
    - name: Get version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Extract Release Notes from CHANGELOG
      id: release_notes
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        echo "Extracting notes for version $VERSION"
        
        # Extract changelog section for this version
        if [ -f "CHANGELOG.md" ]; then
          # Look for version section in CHANGELOG
          sed -n "/## \[$VERSION\]/,/^##/p" CHANGELOG.md | sed '$d' > release_notes_temp.md
          
          # Read the content
          RELEASE_NOTES=$(cat release_notes_temp.md)
          
          # If no content found, use default
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="### Changes
          - Bug fixes and improvements
          - Performance enhancements"
          fi
          
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        else
          echo "No CHANGELOG.md found"
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "### Changes
          - Bug fixes and improvements" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi
    
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: FAAH Terminal Alert v${{ steps.version.outputs.VERSION }}
        body: |
          ## :tada: FAAH Terminal Alert v${{ steps.version.outputs.VERSION }}
          
          ### :package: Installation
          ```bash
          code --install-extension raghul-tech.faah-terminal-alert
          ```
          
          Or search for **"FAAH Terminal Alert"** in the VS Code Marketplace.
          
          ---
          
          ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          
          ---
          
          ### :link: Quick Links
          - [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=raghul-tech.faah-terminal-alert)
          - [Documentation](https://github.com/raghul-tech/faah-terminal-alert/blob/main/README.md)
          - [Report Issues](https://github.com/raghul-tech/faah-terminal-alert/issues)
          - [Full Changelog](https://github.com/raghul-tech/faah-terminal-alert/blob/main/CHANGELOG.md)
          
          ### :star: Support
          If you find this extension helpful, please:
          - :star: Star it on GitHub
          - :thumbsup: Rate it on the Marketplace
          - :bug: Report any issues you find
          
          ---
          _Made with :heart: for developers who hate staring at terminals!_
        draft: false
        prerelease: false
    
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./faah-terminal-alert-${{ steps.version.outputs.VERSION }}.vsix
        asset_name: faah-terminal-alert-${{ steps.version.outputs.VERSION }}.vsix
        asset_content_type: application/octet-stream
