name: Lint and Format

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit --project tsconfig.json

      - name: Check for console.log statements
        run: |
          if grep -r "console\.log" src/ --include="*.ts" --include="*.js" 2>/dev/null; then
            echo "❌ console.log found in source — remove before committing."
            exit 1
          fi
          echo "✅ No console.log statements found"

      - name: Check for debugger statements
        run: |
          if grep -r "debugger" src/ --include="*.ts" --include="*.js" 2>/dev/null; then
            echo "❌ debugger statements found — remove before committing."
            exit 1
          fi
          echo "✅ No debugger statements found"

      - name: Validate package.json
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"
          echo "✅ package.json is valid JSON"

      - name: Check required files exist
        run: |
          missing=""
          for file in README.md CHANGELOG.md LICENSE; do
            [ ! -f "$file" ] && missing="$missing $file"
          done
          if [ -n "$missing" ]; then
            echo "❌ Missing required files:$missing"
            exit 1
          fi
          echo "✅ All required files present"

      - name: Check extension icon
        run: |
          if [ ! -f "media/icon.png" ]; then
            echo "⚠️  Warning: No icon found at media/icon.png"
          else
            echo "✅ Extension icon found"
          fi

      - name: Check version vs latest tag
        if: github.ref == 'refs/heads/main'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          if [ "$LATEST_TAG" != "none" ]; then
            TAG_VERSION="${LATEST_TAG#v}"
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "ℹ️  package.json version ($PKG_VERSION) differs from latest tag ($TAG_VERSION) — a new release will be created on merge."
            else
              echo "✅ Version matches latest tag ($LATEST_TAG)"
            fi
          else
            echo "ℹ️  No tags found yet — first release pending."
          fi